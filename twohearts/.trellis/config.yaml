# Trellis 配置
# Trellis 工作流系统的项目级设置
#
# 所有值都有合理默认值，只需覆盖你真正需要调整的部分。

#-------------------------------------------------------------------------------
# 会话记录
#-------------------------------------------------------------------------------

# 运行 add_session.py 后，自动提交 journal/index 变更时使用的提交信息
session_commit_message: "chore: 记录日志"

# 单个 journal 文件在轮转到新文件前允许的最大行数
max_journal_lines: 2000

#-------------------------------------------------------------------------------
# 会话自动提交
#-------------------------------------------------------------------------------

# session journal 与 task archive 的自动提交行为。
# - true（默认）：在执行 add_session.py / task.py archive 后，
#   脚本会自动暂存并提交 journal / task 相关变更。
# - false：脚本不操作 git。文件（如 journal-*.md、task 归档移动）
#   仍会写入磁盘，由你自行决定是否 git add / commit。
#
# 如果你的项目有意在 .gitignore 中排除了 `.trellis/`，
# 希望这些会话数据只保留在本地，或希望每次提交前手动审查暂存内容，
# 就使用 `false`。
#
# 接受值：true / false / yes / no / 1 / 0 / on / off（大小写不敏感）。
#
session_auto_commit: false

#-------------------------------------------------------------------------------
# 任务生命周期 Hook
#-------------------------------------------------------------------------------

# task 生命周期事件触发后要执行的 shell 命令。
# 每个 hook 都会收到 `TASK_JSON_PATH` 环境变量，指向 task.json。
# hook 执行失败只会打印警告，不会阻塞主流程。
#
# hooks:
#   after_create:
#     - "echo 'Task created'"
#   after_start:
#     - "echo 'Task started'"
#   after_finish:
#     - "echo 'Task finished'"
#   after_archive:
#     - "echo 'Task archived'"

#-------------------------------------------------------------------------------
# Monorepo / Packages
#-------------------------------------------------------------------------------

# 为 monorepo 项目声明 package。
# Trellis 会在 `trellis init` 时自动探测 workspace，
# 你也可以在这里手动配置。
#
# packages:
#   frontend:
#     path: packages/frontend
#   backend:
#     path: packages/backend
#   docs:
#     path: docs-site
#     type: submodule
#   # 对 polyrepo / meta-repo 布局（子目录各自有独立 .git），
#   # 可给 package 标记 `git: true`。运行时会把它当作独立仓库，
#   # 用于 git 上下文显示等场景。
#   webapp:
#     path: ./webapp
#     git: true

# 未显式指定 --package 时使用的默认 package。
# default_package: frontend

#-------------------------------------------------------------------------------
# Codex（分发行为）
#-------------------------------------------------------------------------------
# 仅对 Codex 生效，其他平台会忽略。默认值 `"inline"` 表示
# 主 Codex agent 直接在主会话中编辑，因为 Codex 子代理以
# `fork_turns="none"` 隔离运行，无法继承父会话的 task 上下文。
# 设置为 `"sub-agent"` 可启用旧的分发模式
# （主 agent 派发 trellis-implement / trellis-check / trellis-research
# 子代理）。
#
# codex:
#   dispatch_mode: inline  # 或填 "sub-agent" 以派发 trellis-* 子代理
codex:
  dispatch_mode: inline
